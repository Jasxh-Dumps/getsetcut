name: Download & Upload to Google Drive

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'Video M3U8 URL'
        required: true
        type: string
      audio_url:
        description: 'Audio M3U8 URL'
        required: true
        type: string
      title:
        description: 'Output filename'
        required: true
        type: string
      quality:
        description: 'Quality'
        required: true
        default: '1080p'
        type: choice
        options:
          - 1080p
          - 4K

jobs:
  download-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ffmpeg python3-pip
          pip3 install yt-dlp requests

      - name: Install rclone
        run: curl https://rclone.org/install.sh | sudo bash

      - name: Setup rclone
        run: |
          mkdir -p ~/.config/rclone
          echo "${{ secrets.RCLONE_CONFIG }}" | base64 -d > ~/.config/rclone/rclone.conf

      - name: Download video stream
        run: |
          yt-dlp \
            -f "best" \
            -o "/tmp/video_only.mp4" \
            "${{ inputs.video_url }}"

      - name: Download audio stream
        run: |
          yt-dlp \
            -f "best" \
            -o "/tmp/audio_only.m4a" \
            "${{ inputs.audio_url }}"

      - name: Merge + Transcode to ProRes
        run: |
          ffmpeg -i /tmp/video_only.mp4 -i /tmp/audio_only.m4a \
            -c:v prores_ks -profile:v 3 \
            -vendor apl0 \
            -c:a pcm_s16le \
            -map 0:v:0 -map 1:a:0 \
            "/tmp/${{ inputs.title }}.mov"

      - name: Upload to Google Drive
        run: |
          rclone copy "/tmp/${{ inputs.title }}.mov" "gdrive:Downloads" \
            --progress
          echo "✅ Upload complete!"

      - name: Cleanup
        if: always()
        run: |
          rm -f /tmp/video_only.mp4 /tmp/audio_only.m4a
          rm -f "/tmp/${{ inputs.title }}.mov"
